# VPS / production: демо SQLite + файлы uploads из образа (первый старт копируются в тома).
# Перед запуском: cp env.deploy.example .env.deploy && отредактируйте секреты и URL.
# Запуск: docker compose --env-file .env.deploy -f docker-compose.vps.yml up -d --build
#
# Сайт на хосте: порт 3000 (Next.js). Бэкенд слушает 8000 только ВНУТРИ сети compose — на хост :8000 не пробрасываем,
# чтобы не пересекаться с другим проектом на VPS. Swagger из браузера: через /api на том же домене (прокси Next).
# См. deploy/nginx-qazaqitacademy.example.conf · при занятом :3000 используйте override (ниже).
# Данные сохраняются в именованных томах Docker (БД и uploads).

services:
  backend:
    build: ./backend
    restart: unless-stopped
    # Не публикуем 8000 на хост — иначе конфликт с другим сервисом на VPS. Доступ к API: контейнер frontend → backend:8000.
    # Раскомментируйте только если нужен прямой доступ к API с хоста (подберите свободный порт, не 8000):
    # ports:
    #   - "8010:8000"
    environment:
      DATABASE_URL: sqlite:////data/education.db
      LMS_DATA_DIR: /data
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      - lms_sqlite_data:/data
      - lms_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5).read()\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Если на сервере занят 3000 — замените на "3010:3000" и в Nginx proxy_pass на 3010
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  lms_sqlite_data:
  lms_uploads:
