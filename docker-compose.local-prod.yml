# Локальный стек как на VPS. Используется ВМЕСТЕ с docker-compose.vps.yml:
#
#   cp env.local-prod.example .env.local-prod
#   docker compose -p lms-local --env-file .env.local-prod \
#     -f docker-compose.vps.yml -f docker-compose.local-prod.yml up -d --build
#
# http://localhost:3000 — приложение
# http://localhost:8001/docs — OpenAPI (на проде бэкенд снаружи не торчит)

services:
  db:
    ports:
      - "5432:5432"
  backend:
    ports:
      - "8001:8000"
