# Локальный стек как на VPS + автоматический перенос backend/education.db → Postgres при каждом up.
#
#   cp env.local-prod.example .env.local-prod
#   docker compose -p lms-local --env-file .env.local-prod \
#     -f docker-compose.vps.yml -f docker-compose.local-prod.yml up -d --build
#
# Порядок: db healthy → import-sqlite (migrate --force) → backend (без seed_* — только схема) → frontend
# Файл SQLite: ./backend/education.db (должен существовать на хосте)
#
# http://localhost:3000  |  http://localhost:8001/docs

services:
  db:
    ports:
      - "5432:5432"

  # Перед backend: заливает актуальный education.db в PostgreSQL (как на диске у разработчика)
  import-sqlite:
    build: ./backend
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-education_platform}
    volumes:
      - ./backend/education.db:/tmp/migrate_source.db:ro
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "python",
        "migrate_sqlite_to_pg.py",
        "--sqlite-url",
        "sqlite:////tmp/migrate_source.db",
        "--force",
      ]

  backend:
    ports:
      - "8001:8000"
    environment:
      # Локально данные из SQLite — демо-seed_* не запускаем (им портят перенос)
      LMS_SKIP_ENTRYPOINT_SEED: "1"
    depends_on:
      import-sqlite:
        condition: service_completed_successfully
